<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Central | Musical Instruments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="logo">🎵 Harmony Central</div>
        <nav>
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <button id="cart-btn">Cart (<span id="cart-count">0</span>)</button>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Find Your Rhythm</h1>
            <p>Explore premium guitars, keyboards, drums, and accessories.</p>
            <a href="#products" class="btn">Shop Now</a>
        </div>
    </section>

    <!-- Products Section -->
    <main id="products">
        <h2>Featured Instruments</h2>
        <div class="product-grid" id="product-list">
            <!-- Products will be generated dynamically by JavaScript -->
        </div>
    </main>

    <!-- Shopping Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Your Shopping Cart</h2>
            <div id="cart-items">
                <!-- Cart items appear here -->
            </div>
            <div class="cart-total">
                <strong>Total: $<span id="cart-total-price">0.00</span></strong>
            </div>
            <button class="btn checkout-btn" onclick="alert('Thank you for your purchase!')">Checkout</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Harmony Central. Built for music lovers.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
